<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考同学互赠留言墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f9fc;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            margin: 30px 0;
            color: #2d3436;
        }

        .title h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #0984e3;
        }

        .title p {
            font-size: 16px;
            color: #636e72;
        }

        .input-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }

        textarea {
            min-height: 110px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #0984e3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0770c4;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            animation: fadeIn 0.4s ease;
        }

        .name {
            font-weight: bold;
            color: #0984e3;
            margin-bottom: 8px;
            font-size: 17px;
        }

        .content {
            color: #2d3436;
            line-height: 1.6;
            font-size: 15px;
        }

        .time {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">
            <h1>🎓 高考同学互赠留言墙</h1>
            <p>愿我们顶峰相见，前程似锦，未来可期</p>
        </div>

        <div class="input-card">
            <input type="text" id="name" placeholder="你的名字">
            <textarea id="msg" placeholder="写下你想对同学说的高考祝福..."></textarea>
            <button onclick="send()">发送留言</button>
        </div>

        <div class="message-list" id="list"></div>
    </div>

    <script>
        // 使用免费开源的 JSONBin 服务，国内可访问
        const BIN_ID = "679a278cad19ca6b753d1301";
        const API_KEY = "$2b$10$Xv8wN0A1eE4G5tQV6H7Z8a9b0c1d2e3f4g5h6j7k8l9";
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // 页面加载时获取所有留言
        window.onload = loadMessages();

        async function loadMessages() {
            try {
                let res = await fetch(URL);
                let data = await res.json();
                let list = data.record.messages || [];
                render(list);
            } catch (e) {
                console.log("加载失败");
            }
        }

        function render(list) {
            const box = document.getElementById("list");
            box.innerHTML = "";
            list.forEach(item => {
                const div = document.createElement("div");
                div.className = "message";
                div.innerHTML = `
                    <div class="name">${item.name}</div>
                    <div class="content">${item.content}</div>
                    <div class="time">${item.time}</div>
                `;
                box.appendChild(div);
            });
        }

        async function send() {
            const name = document.getElementById("name").value.trim();
            const content = document.getElementById("msg").value.trim();

            if (!name || !content) {
                alert("请填写完整再发送哦！");
                return;
            }

            try {
                // 获取现有留言
                let res = await fetch(URL);
                let data = await res.json();
                let messages = data.record.messages || [];

                // 新增留言
                const d = new Date();
                const time = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,0)}-${d.getDate().toString().padStart(2,0)} ${d.getHours().toString().padStart(2,0)}:${d.getMinutes().toString().padStart(2,0)}`;
                
                messages.unshift({ name, content, time });

                // 保存到云端
                await fetch(URL, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Api-Key": API_KEY
                    },
                    body: JSON.stringify({ messages })
                });

                alert("发送成功！全班同学都能看到啦！");
                document.getElementById("name").value = "";
                document.getElementById("msg").value = "";
                loadMessages();
            } catch (e) {
                alert("发送失败，请稍后再试");
            }
        }
    </script>
</body>
</html>
